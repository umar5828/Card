<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
      body{
        font-family: 'Inter';
      }
  .card-input:focus{
    box-shadow: none;
  }
  .card-btn:hover{
    background-color: rgb(255, 255, 255);
    color: blue;
  }
    </style>
  </head>
<body>
    <div class="card shadow border-0" style="width: 22rem; margin:  50px auto ;">
     <div class="row my-3">
      <div class="col-4 d-flex justify-content-center">
        <img src="./bottle-coca-cola-png-transparent-2.png" width="80px" class="border border-warning border-3 rounded-circle img-fluid" alt="">
      </div>
      <div class="col-8 d-flex justify-content-center flex-column">
        <h5 class="card-title text-primary fw-bolder fs-3">Coca Cola</h5>
        <p class="card-text text-secondary">Ichsang kayf qilasan jiyancha</p>
      </div>
     </div>
    <div class="card-body">
      <div class="row mb-3 align-items-center" >
        <div class="col-4  ms-1 ">
          <input type="number" class="form-control card-input rounded border-warning text-secondary" required>
        </div>
        <div class="col-1 d-flex flex-column" style="margin-left: -10px;">
          <span style="cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-circle" viewBox="0 0 16 16">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
              <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
            </svg>
          </span>
          <span style="cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-dash-circle" viewBox="0 0 16 16">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
              <path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"/>
            </svg>
          </span>
        </div>
        <div class="col-6 offset-1" >
          <button class="btn card-btn btn-primary fw-semibold" type="submit">Buyurtma berish</button>
        </div>
       </div>
    </div>
      </div>    
</body>
</html>
